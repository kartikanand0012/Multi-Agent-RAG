apiVersion: v1
kind: Service
metadata:
  name: rag-app-service
  namespace: default
spec:
  selector:
    app: rag-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer

---
apiVersion: v1
kind: Service
metadata:
  name: rag-redis
  namespace: default
spec:
  selector:
    app: rag-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
  type: ClusterIP
