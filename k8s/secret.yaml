apiVersion: v1
kind: Secret
metadata:
  name: rag-secrets
  namespace: default
type: Opaque
stringData:
  AZURE_OPENAI_ENDPOINT: "REPLACE_WITH_YOUR_ENDPOINT"
  AZURE_OPENAI_API_KEY: "REPLACE_WITH_YOUR_KEY"
  LANGFUSE_PUBLIC_KEY: "REPLACE_WITH_LANGFUSE_PUBLIC_KEY"
  LANGFUSE_SECRET_KEY: "REPLACE_WITH_LANGFUSE_SECRET_KEY"
  LANGFUSE_HOST: "https://cloud.langfuse.com"
# IMPORTANT: Never commit real values. Fill these in manually on the cluster:
#   kubectl create secret generic rag-secrets \
#     --from-literal=AZURE_OPENAI_ENDPOINT=<your-endpoint> \
#     --from-literal=AZURE_OPENAI_API_KEY=<your-key> \
#     --from-literal=LANGFUSE_PUBLIC_KEY=<your-key> \
#     --from-literal=LANGFUSE_SECRET_KEY=<your-key> \
#     --from-literal=LANGFUSE_HOST=https://cloud.langfuse.com
